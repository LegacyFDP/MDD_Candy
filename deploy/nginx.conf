# nginx reverse proxy for Fete Store Manager
# Place at /etc/nginx/sites-available/fete-store, then:
#   ln -s /etc/nginx/sites-available/fete-store /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Replace fete.example.com with your domain (or the VPS public IP for testing).
# After this works over HTTP, run:  certbot --nginx -d fete.example.com
# which rewrites this file to add the TLS (443) server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name 217.154.60.212 localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Cap upload size (no file uploads in this app, keep it small).
    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
