# nginx reverse proxy for Fete Store Manager — Docker Compose variant.
# Mounted into the nginx container by docker-compose.yml; `proxy_pass
# http://backend:8080` relies on Compose's internal DNS for the `backend`
# service, so this file only works inside that network.
#
# For a bare-metal (non-Docker) install, don't copy this file — use the
# inline nginx config in DEPLOY.md instead, which proxies to 127.0.0.1:8080.
#
# Replace 217.154.60.212 with your domain once DNS is pointed at the VPS.
# After this works over HTTP, run:  certbot --nginx -d fete.example.com
# which rewrites this file to add the TLS (443) server block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name 217.154.60.212 localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Cap upload size (no file uploads in this app, keep it small).
    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
