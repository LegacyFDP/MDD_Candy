services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: fete-store-db
    environment:
      POSTGRES_USER: fete_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fete_password}
      POSTGRES_DB: fete_store
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fete_user -d fete_store"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fete-network
    restart: unless-stopped

  # Node.js/Express backend server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fete-store-backend
    environment:
      DATABASE_URL: postgres://fete_user:${DB_PASSWORD:-fete_password}@postgres:5432/fete_store
      PGSSL: false
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fete-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Nginx reverse proxy + frontend static files
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fete-store-proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - fete-network
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  fete-network:
    driver: bridge

volumes:
  postgres_data:
